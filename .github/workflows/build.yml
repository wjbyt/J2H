name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          path=$(find app/build/outputs/apk -name '*.apk' | head -n1)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          ls -la "$path"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: J2H-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish to Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            自动构建。下方 `app-debug.apk` 即为 Android 安装包。

            提交: ${{ github.sha }}
          files: ${{ steps.apk.outputs.path }}
